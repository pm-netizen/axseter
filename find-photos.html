body{font-family:system-ui;background:#111;color:#fff;padding:1rem;max-width:1400px;margin:0 auto}
h1{text-align:center}
.status{text-align:center;margin:0.5rem 0;font-size:1rem}
.city{margin-bottom:1.5rem;border:1px solid #333;border-radius:8px;overflow:hidden}
.city-name{background:#1e3a5f;padding:0.5rem 1rem;font-weight:bold;display:flex;justify-content:space-between}
.city-name.done{background:#166534}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:4px;padding:4px}
.p{position:relative;aspect-ratio:16/9;background:#222;cursor:pointer;border:3px solid transparent}
.p.pick-hero{border-color:#ef4444}.p.pick-street{border-color:#3b82f6}.p.pick-dusk{border-color:#a855f7}
.p img{width:100%;height:100%;object-fit:cover}
.p .lbl{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.8);padding:3px 6px;font-size:10px;word-break:break-all}
.p.fail{opacity:0.15}
.legend{text-align:center;margin:0.5rem 0;font-size:0.9rem}
.legend span{margin:0 1rem;padding:2px 8px;border-radius:4px}
.legend .h{border:2px solid #ef4444}.legend .s{border:2px solid #3b82f6}.legend .d{border:2px solid #a855f7}
button{margin:0.5rem;padding:0.5rem 1.5rem;border:none;border-radius:6px;cursor:pointer;color:white;font-size:0.9rem}
.export{background:#16a34a}.export:hover{background:#15803d}
</style>

<button class="export" onclick="doExport()">⬇️ Download Selections</button>

// What each city needs
const NEEDS = {
  "atlanta":["hero","dusk"],"charlotte":["hero","street","dusk"],"columbus":["hero","street","dusk"],
  "dallas-fort-worth":["hero","dusk"],"houston":["street"],"indianapolis":["hero","street","dusk"],
  "jacksonville":["hero","street","dusk"],"kansas-city":["hero","street","dusk"],
  "nashville":["hero"],"philadelphia":["street"],"phoenix":["hero"],
  "portland":["hero","street","dusk"],"salt-lake-city":["hero","street","dusk"],
  "san-antonio":["hero","street","dusk"],"san-diego":["hero","dusk"],
  "san-francisco":["dusk"],"san-juan":["hero","street","dusk"],
  "seattle":["street"],"tampa":["hero","street","dusk"],
  "toronto":["hero","street","dusk"],"vancouver":["hero","street","dusk"]
};

const TYPES = ['hero','street','dusk'];
const COLORS = {hero:'#ef4444',street:'#3b82f6',dusk:'#a855f7'};
const selections = {};
let totalTested = 0;
const totalPhotos = Object.values(CANDIDATES).reduce((a,b)=>a+b.length,0);

const grid = document.getElementById('grid');

Object.entries(CANDIDATES).sort().forEach(([city, ids]) => {
  selections[city] = {};
  const needs = NEEDS[city];
  const div = document.createElement('div');
  div.className = 'city';
  div.id = 'city-' + city;
  div.innerHTML = `<div class="city-name" id="cn-${city}"><span>${city} — needs: ${needs.join(', ')}</span><span id="ct-${city}"></span></div><div class="grid" id="g-${city}"></div>`;
  const g = div.querySelector('.grid');
  
  ids.forEach(id => {
    const slot = document.createElement('div');
    slot.className = 'p';
    slot.dataset.id = id;
    slot.dataset.city = city;
    const img = new Image();
    img.src = `https://images.unsplash.com/${id}?w=400&h=225&fit=crop&q=60`;
    img.onload = () => { totalTested++; updateStatus(); };
    img.onerror = () => { slot.classList.add('fail'); totalTested++; updateStatus(); };
    slot.appendChild(img);
    slot.innerHTML += `<div class="lbl">${id}</div>`;
    
    slot.onclick = () => {
      if (slot.classList.contains('fail')) return;
      // Cycle assignment
      const cur = slot.dataset.assign || '';
      const idx = needs.indexOf(cur);
      const next = idx < needs.length - 1 ? needs[idx + 1] : '';
      
      // Clear previous of same type
      if (next) {
        document.querySelectorAll(`[data-city="${city}"].pick-${next}`).forEach(el => {
          el.classList.remove(`pick-${next}`);
          if (!el.dataset.assign || el.dataset.assign === next) el.dataset.assign = '';
          el.querySelector('.lbl').textContent = el.dataset.id;
          delete selections[city][next];
        });
      }
      
      // Remove current assignment
      TYPES.forEach(t => slot.classList.remove(`pick-${t}`));
      
      if (next) {
        slot.dataset.assign = next;
        slot.classList.add(`pick-${next}`);
        slot.querySelector('.lbl').textContent = `✅ ${next.toUpperCase()}: ${id}`;
        selections[city][next] = id;
      } else {
        slot.dataset.assign = '';
        slot.querySelector('.lbl').textContent = id;
        if (cur) delete selections[city][cur];
      }
      updateCityStatus(city);
    };
    g.appendChild(slot);
  });
  grid.appendChild(div);
});

function updateStatus() {
  document.getElementById('status').textContent = `Testing: ${totalTested}/${totalPhotos}`;
}
function updateCityStatus(city) {
  const needs = NEEDS[city];
  const filled = needs.filter(n => selections[city][n]);
  document.getElementById('ct-' + city).textContent = `${filled.length}/${needs.length}`;
  if (filled.length === needs.length) {
    document.getElementById('cn-' + city).classList.add('done');
  }
}

function doExport() {
  const out = {};
  Object.entries(selections).forEach(([city, picks]) => {
    if (Object.keys(picks).length > 0) out[city] = picks;
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'photo-picks.json';
  a.click();
}
