<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo Tester</title>
<style>
body{font-family:system-ui;background:#111;color:#fff;padding:1rem;max-width:1400px;margin:0 auto}
h1{text-align:center;margin-bottom:0.5rem}
.legend{text-align:center;margin:0.5rem 0;font-size:0.85rem}
.legend span{margin:0 0.5rem;padding:2px 8px;border-radius:4px}
.legend .h{border:2px solid #ef4444}.legend .s{border:2px solid #3b82f6}.legend .d{border:2px solid #a855f7}
.status{text-align:center;margin:0.5rem 0}
.city{margin-bottom:1.5rem;border:1px solid #333;border-radius:8px;overflow:hidden}
.cn{background:#1e3a5f;padding:0.5rem 1rem;font-weight:bold;display:flex;justify-content:space-between}
.cn.ok{background:#166534}
.gr{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:3px;padding:3px}
.p{position:relative;aspect-ratio:16/9;background:#222;cursor:pointer;border:3px solid transparent;transition:border-color 0.2s}
.p.hero{border-color:#ef4444}.p.street{border-color:#3b82f6}.p.dusk{border-color:#a855f7}
.p img{width:100%;height:100%;object-fit:cover}
.p .l{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.85);padding:3px 6px;font-size:10px}
.p.fail{opacity:0.1;pointer-events:none}
button{margin:0.5rem;padding:0.75rem 2rem;border:none;border-radius:8px;cursor:pointer;color:white;font-size:1rem}
.exp{background:#16a34a}
</style>
</head>
<body>
<h1>🔍 City Photo Tester</h1>
<p class="legend">Click photos to assign: <span class="h">🔴 Hero</span> <span class="s">🔵 Street</span> <span class="d">🟣 Dusk</span> (click again to cycle/clear)</p>
<div class="status" id="st">Testing...</div>
<button class="exp" onclick="exp()">⬇️ Download Selections JSON</button>
<div id="grid"></div>
<script>

  needs: ["hero","street","dusk"],
  ids: ["W6UOPaT67fI","VLW2GjQHlgE","photo-1486406146926-c627a92ad1ab","photo-1449824913935-59a10b8d2000","photo-1464822759023-fed622ff2c3b","photo-1497215842964-222b430dc094"]

};

const sel = {};
let done = 0, total = 0;
Object.values(C).forEach(c => total += c.ids.length);
const grid = document.getElementById('grid');

Object.entries(C).sort().forEach(([city, info]) => {
  sel[city] = {};
  const div = document.createElement('div');
  div.className = 'city';
  div.innerHTML = `<div class="cn" id="cn-${city}"><span>${city} — needs: ${info.needs.join(', ')}</span><span id="ct-${city}"></span></div><div class="gr"></div>`;
  const g = div.querySelector('.gr');
  
  info.ids.forEach(id => {
    const s = document.createElement('div');
    s.className = 'p'; s.dataset.id = id; s.dataset.city = city;
    const img = new Image();
    img.src = `https://images.unsplash.com/${id}?w=400&h=225&fit=crop&q=60`;
    img.onload = () => { done++; upd(); };
    img.onerror = () => { s.classList.add('fail'); done++; upd(); };
    s.appendChild(img);
    s.innerHTML += `<div class="l">${id}</div>`;
    
    s.onclick = () => {
      if (s.classList.contains('fail')) return;
      const needs = info.needs;
      const cur = s.dataset.assign || '';
      const idx = needs.indexOf(cur);
      const next = idx < needs.length - 1 ? needs[idx + 1] : '';
      
      if (next) {
        document.querySelectorAll(`[data-city="${city}"].${next}`).forEach(el => {
          el.classList.remove(next); el.dataset.assign = ''; 
          el.querySelector('.l').textContent = el.dataset.id;
          delete sel[city][next];
        });
      }
      ['hero','street','dusk'].forEach(t => s.classList.remove(t));
      
      if (next) {
        s.dataset.assign = next; s.classList.add(next);
        s.querySelector('.l').textContent = `✅ ${next.toUpperCase()}: ${id}`;
        sel[city][next] = id;
      } else {
        s.dataset.assign = ''; s.querySelector('.l').textContent = id;
        if (cur) delete sel[city][cur];
      }
      updCity(city);
    };
    g.appendChild(s);
  });
  grid.appendChild(div);
});

function upd() {
  document.getElementById('st').textContent = done < total ? `Testing ${done}/${total}...` : `✅ Done! Select photos then download.`;
}
function updCity(city) {
  const n = C[city].needs, f = n.filter(t => sel[city][t]);
  document.getElementById('ct-' + city).textContent = `${f.length}/${n.length}`;
  document.getElementById('cn-' + city).classList.toggle('ok', f.length === n.length);
}

function exp() {
  const out = {};
  Object.entries(sel).forEach(([city, picks]) => {
    if (Object.keys(picks).length > 0) out[city] = picks;
  });
  const blob = new Blob([JSON.stringify(out, null, 2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = 'photo-picks.json'; a.click();
}
