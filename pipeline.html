<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Pipeline | Axseter Systems</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'navy': { 50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8', 400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68', 800: '#243b53', 900: '#102a43', 950: '#0a1929' },
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .mono { font-family: 'Inter', monospace; }
    .score-ring { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
    .lead-row { transition: all 0.2s ease; }
    .lead-row:hover { transform: translateX(4px); }
    .expanded-panel { max-height: 0; overflow: hidden; transition: max-height 0.3s ease, opacity 0.3s ease; opacity: 0; }
    .expanded-panel.open { max-height: 600px; opacity: 1; }
    .vert-pill { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 999px; letter-spacing: 0.02em; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- Auth Gate -->
<div id="authGate" class="min-h-screen flex items-center justify-center bg-navy-950">
  <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-sm">
    <div class="text-center mb-8">
      <span class="text-2xl font-black tracking-tight text-navy-900" style="font-family: 'Inter'; letter-spacing: -0.03em;">AXSETER<sup class="text-xs font-semibold text-gray-400 ml-0.5">&trade;</sup></span>
      <p class="text-gray-500 text-sm mt-2">Pipeline Dashboard</p>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
      <input type="password" id="authPass" class="w-full px-4 py-3 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" placeholder="Enter access code" onkeydown="if(event.key==='Enter')checkAuth()">
      <button onclick="checkAuth()" class="w-full mt-4 bg-navy-900 hover:bg-navy-800 text-white font-semibold py-3 rounded-lg text-sm transition-colors">Access Pipeline</button>
      <p id="authErr" class="text-red-500 text-xs mt-2 hidden">Invalid access code.</p>
    </div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard" class="hidden">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-6 lg:px-8 flex items-center justify-between h-16">
      <div class="flex items-center gap-4">
        <a href="/" class="text-xl font-black tracking-tight text-navy-900" style="font-family: 'Inter'; letter-spacing: -0.03em;">AXSETER<sup class="text-[10px] font-semibold text-gray-400 ml-0.5">&trade;</sup></a>
        <span class="text-gray-300 text-lg font-light">/</span>
        <span class="text-gray-500 font-medium text-sm">Pipeline</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-gray-400 mono" id="lastUpdated"></span>
        <button onclick="document.getElementById('dashboard').classList.add('hidden');document.getElementById('authGate').classList.remove('hidden');sessionStorage.removeItem('ax_auth');" class="text-gray-400 hover:text-gray-600 text-sm">Sign out</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 lg:px-8 py-8">
    <!-- Metrics -->
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-4 mb-8" id="metrics"></div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-2 mb-6" id="filters"></div>

    <!-- Status Filter -->
    <div class="flex flex-wrap gap-2 mb-6" id="statusFilters"></div>

    <!-- Pipeline -->
    <div id="pipeline"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-16">
      <p class="text-gray-400 text-sm">No leads match the current filter.</p>
    </div>
  </main>
</div>

<script>
const ACCESS_CODE = 'axseter2026';

function checkAuth() {
  const v = document.getElementById('authPass').value;
  if (v === ACCESS_CODE) {
    sessionStorage.setItem('ax_auth', '1');
    document.getElementById('authGate').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    init();
  } else {
    document.getElementById('authErr').classList.remove('hidden');
  }
}

if (sessionStorage.getItem('ax_auth') === '1') {
  document.getElementById('authGate').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  window.addEventListener('DOMContentLoaded', init);
}

const SUPABASE_URL = 'https://cvbpgjveazhmavoaszxp.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN2YnBnanZlYXpobWF2b2FzenhwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3ODQ2MjIsImV4cCI6MjA4OTM2MDYyMn0.PeP17xicAK_gQPricJcR0K1sGinsWUQiijmcPNNCGjM';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let LEADS = [];

const VERT_COLORS = {
  dental: { bg:'bg-purple-50', text:'text-purple-700', border:'border-purple-200' },
  behavioral: { bg:'bg-pink-50', text:'text-pink-700', border:'border-pink-200' },
  pt: { bg:'bg-teal-50', text:'text-teal-700', border:'border-teal-200' },
  insurance: { bg:'bg-blue-50', text:'text-blue-700', border:'border-blue-200' },
  vet: { bg:'bg-amber-50', text:'text-amber-700', border:'border-amber-200' },
  qsr: { bg:'bg-orange-50', text:'text-orange-700', border:'border-orange-200' }
};

const VERT_LABELS = { all:'All verticals', dental:'Dental', behavioral:'Behavioral health', pt:'Physical therapy', insurance:'Insurance', vet:'Veterinary', qsr:'QSR / Retail' };
const STATUS_LABELS = { all:'All statuses', ready:'Outreach ready', research:'Needs research', monitor:'Monitoring', sent:'Sent', responded:'Responded' };

let activeVert = 'all';
let activeStatus = 'all';
let openOutreach = null;

const TEMPLATES = {
  expansion_announcement: (l) => ({
    subject: `Infrastructure partner for ${l.name}'s expansion`,
    body: `Hi [First Name],

I saw ${l.name} is ${l.signal.split('.')[0].toLowerCase()}. Congratulations on the growth.

Companies at your stage of expansion typically hit an inflection point with low-voltage infrastructure — managing a different cabling and security contractor in every market creates inconsistency, change orders, and overhead that scales with every new location.

Axseter is a national low-voltage integrator built specifically for this problem. We're the single point of contact for structured cabling, access control, and surveillance across 500+ locations for companies like ${l.vertical === 'dental' ? 'Oak Street Health and CVS' : l.vertical === 'behavioral' ? 'Oak Street Health and ATI Physical Therapy' : l.vertical === 'insurance' ? 'Pronto Insurance and Gallagher' : 'Oak Street Health and CVS'}. Location 47 is installed identically to location 3.

Would a 20-minute conversation be useful as you plan the infrastructure side of the expansion?

Best,
[Sender Name]
Axseter Systems
1-877-AXSETR1`
  }),
  acquisition_integration: (l) => ({
    subject: `Standardizing infrastructure across ${l.name}'s acquired locations`,
    body: `Hi [First Name],

Acquiring new ${l.vertical === 'dental' ? 'practices' : l.vertical === 'behavioral' ? 'clinics' : l.vertical === 'insurance' ? 'branches' : 'locations'} means inheriting different cabling setups, camera systems, and access control configurations at every site. Most platform companies we work with find that standardization pays for itself within the first year through reduced support costs and faster integration.

Axseter handles national low-voltage infrastructure for ${l.vertical === 'dental' ? 'dental' : l.vertical === 'behavioral' ? 'healthcare' : 'multi-location'} platforms like ${l.vertical === 'dental' || l.vertical === 'behavioral' || l.vertical === 'pt' ? 'Oak Street Health and ATI Physical Therapy' : 'Pronto Insurance and Gallagher'}. One spec, one contract, consistent execution whether you're integrating locations in one state or twenty.

Happy to share how similar companies approached the standardization challenge if it's relevant to your integration roadmap.

Best,
[Sender Name]
Axseter Systems
1-877-AXSETR1`
  }),
  vendor_consolidation: (l) => ({
    subject: `From ${l.states} contractors to one — ${l.name}'s infrastructure`,
    body: `Hi [First Name],

At ${l.locations} locations across ${l.states} states, ${l.name} is likely managing ${l.states}+ different low-voltage contractors — each with different quality standards, pricing, and responsiveness. That overhead compounds with every new location.

Axseter replaces that fragmentation with a single national partner. One contract, one set of specs, one team that knows your infrastructure. Our clients typically see $25,000+ in annual overhead savings and 10-15% fewer change orders from the consolidation.

We handle structured cabling, access control, and surveillance for companies like ${l.vertical === 'dental' ? 'Oak Street Health and CVS' : l.vertical === 'insurance' ? 'Pronto Insurance and Gallagher' : 'ATI Physical Therapy and CVS'} — 500+ locations installed to the same standard, nationwide.

Worth a conversation?

Best,
[Sender Name]
Axseter Systems
1-877-AXSETR1`
  })
};

function generateOutreach(id) {
  const l = LEADS.find(x => x.id === id);
  if (!l || !l.outreachTemplate) return;
  const tmpl = TEMPLATES[l.outreachTemplate];
  if (!tmpl) return;
  return tmpl(l);
}

function showOutreach(id, evt) {
  if (evt) evt.stopPropagation();
  const l = LEADS.find(x => x.id === id);
  if (!l) return;
  const rid = l.rid;
  const draft = generateOutreach(id);
  if (!draft) return;
  openOutreach = id;
  const el = document.getElementById('outreach-' + rid);
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    openOutreach = null;
    return;
  }
  document.querySelectorAll('[id^=outreach-].open').forEach(e => e.classList.remove('open'));
  document.getElementById('outreach-subject-' + rid).value = draft.subject;
  document.getElementById('outreach-body-' + rid).value = draft.body;
  el.classList.add('open');
  autoResize(document.getElementById('outreach-body-' + rid));
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

function copyOutreach(id, evt) {
  if (evt) evt.stopPropagation();
  const l = LEADS.find(x => x.id === id);
  if (!l) return;
  const rid = l.rid;
  const subj = document.getElementById('outreach-subject-' + rid).value;
  const body = document.getElementById('outreach-body-' + rid).value;
  const full = 'Subject: ' + subj + '\n\n' + body;
  navigator.clipboard.writeText(full).then(() => {
    const btn = document.getElementById('copy-btn-' + rid);
    btn.textContent = 'Copied!';
    btn.classList.remove('bg-navy-900', 'hover:bg-navy-800');
    btn.classList.add('bg-green-600');
    setTimeout(() => {
      btn.textContent = 'Copy to clipboard';
      btn.classList.remove('bg-green-600');
      btn.classList.add('bg-navy-900', 'hover:bg-navy-800');
    }, 2000);
  });
}

function markSent(id, evt) {
  if (evt) evt.stopPropagation();
  const l = LEADS.find(x => x.id === id);
  if (l) {
    const rid = l.rid;
    l.status = 'sent';
    document.getElementById('outreach-' + rid).classList.remove('open');
    sb.from('leads').update({ status: 'sent' }).eq('id', id).then(() => {
      const subj = document.getElementById('outreach-subject-' + rid)?.value || '';
      const body = document.getElementById('outreach-body-' + rid)?.value || '';
      sb.from('outreach').insert({ lead_id: id, template_used: l.outreachTemplate, subject: subj, body: body, status: 'sent', sent_at: new Date().toISOString() });
      sb.from('activity').insert({ lead_id: id, action: 'outreach_sent', detail: 'Subject: ' + subj });
    });
    renderAll();
  }
}

function archiveLead(id, evt) {
  if (evt) evt.stopPropagation();
  sb.from('leads').update({ status: 'archived', archived_at: new Date().toISOString() }).eq('id', id).then(() => {
    sb.from('activity').insert({ lead_id: id, action: 'archived', detail: 'Lead archived' });
  });
  const idx = LEADS.findIndex(x => x.id === id);
  if (idx > -1) LEADS.splice(idx, 1);
  renderAll();
}

function renderAll() {
  renderMetrics();
  renderFilters();
  renderStatusFilters();
  renderPipeline();
}

function mapLead(row) {
  return {
    id: row.id,
    rid: row.id.replace(/-/g, ''),
    name: row.name,
    score: row.score || 0,
    tier: row.tier || 3,
    vertical: row.vertical || '',
    vertLabel: row.vertical_label || row.vertical || '',
    locations: row.locations || '',
    states: row.states || 0,
    signal: row.signal || '',
    contact: row.play && row.play.includes('Research') ? 'Research needed' : 'VP of Real Estate / Facilities',
    contactName: '',
    email: '',
    linkedin: '',
    value: row.estimated_value || '',
    play: row.play || '',
    ownership: row.ownership || '',
    status: row.status || 'new',
    outreachTemplate: row.outreach_template || '',
    signalDate: row.signal_date || '',
    source: row.signal_source || '',
    pe_backed: row.pe_backed || false
  };
}

async function loadLeads() {
  const { data, error } = await sb
    .from('leads')
    .select('*')
    .not('status', 'eq', 'archived')
    .order('score', { ascending: false });
  if (error) {
    console.error('Failed to load leads:', error);
    return;
  }
  LEADS = (data || []).map(mapLead);
}

async function loadContacts() {
  const { data } = await sb.from('contacts').select('*');
  if (data) {
    for (const c of data) {
      const l = LEADS.find(x => x.id === c.lead_id);
      if (l) {
        if (c.name) l.contactName = c.name;
        if (c.title) l.contact = c.title;
        if (c.email) l.email = c.email;
        if (c.linkedin) l.linkedin = c.linkedin;
      }
    }
  }
}

async function init() {
  document.getElementById('lastUpdated').textContent = 'Loading...';
  await loadLeads();
  await loadContacts();
  document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });
  renderAll();
}

function renderMetrics() {
  const t1 = LEADS.filter(l => l.tier === 1).length;
  const t2 = LEADS.filter(l => l.tier === 2).length;
  const ready = LEADS.filter(l => l.status === 'ready').length;
  const verts = new Set(LEADS.map(l => l.vertical)).size;
  const el = document.getElementById('metrics');
  el.innerHTML = [
    { v: t1, l: 'Tier 1 leads', c: 'text-green-600' },
    { v: t2, l: 'Tier 2 leads', c: 'text-blue-600' },
    { v: ready, l: 'Outreach ready', c: 'text-navy-900' },
    { v: '$2.4M', l: 'Est. pipeline value', c: 'text-navy-900' },
    { v: verts, l: 'Verticals', c: 'text-navy-900' },
  ].map(m => `
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <div class="text-2xl font-bold ${m.c} mono">${m.v}</div>
      <div class="text-xs text-gray-500 font-medium mt-1 uppercase tracking-wide">${m.l}</div>
    </div>`).join('');
}

function renderFilters() {
  const verts = ['all', ...new Set(LEADS.map(l => l.vertical))];
  document.getElementById('filters').innerHTML = verts.map(v => {
    const ct = v === 'all' ? LEADS.length : LEADS.filter(l => l.vertical === v).length;
    const on = v === activeVert;
    return `<button onclick="activeVert='${v}';renderFilters();renderStatusFilters();renderPipeline();" class="px-3 py-1.5 rounded-lg text-xs font-semibold transition-all ${on ? 'bg-navy-900 text-white' : 'bg-white text-gray-500 border border-gray-200 hover:border-gray-300 hover:text-gray-700'}">${VERT_LABELS[v] || v}${v !== 'all' ? ' (' + ct + ')' : ''}</button>`;
  }).join('');
}

function renderStatusFilters() {
  const statuses = ['all', 'ready', 'research', 'sent', 'monitor'];
  document.getElementById('statusFilters').innerHTML = statuses.map(s => {
    const filtered = activeVert === 'all' ? LEADS : LEADS.filter(l => l.vertical === activeVert);
    const ct = s === 'all' ? filtered.length : filtered.filter(l => l.status === s).length;
    const on = s === activeStatus;
    return `<button onclick="activeStatus='${s}';renderStatusFilters();renderPipeline();" class="px-3 py-1.5 rounded-lg text-xs font-medium transition-all ${on ? 'bg-gray-200 text-gray-800' : 'bg-white text-gray-400 border border-gray-100 hover:text-gray-600'}">${STATUS_LABELS[s]}${s !== 'all' ? ' (' + ct + ')' : ''}</button>`;
  }).join('');
}

function renderPipeline() {
  let filtered = LEADS;
  if (activeVert !== 'all') filtered = filtered.filter(l => l.vertical === activeVert);
  if (activeStatus !== 'all') filtered = filtered.filter(l => l.status === activeStatus);

  const el = document.getElementById('pipeline');
  const empty = document.getElementById('emptyState');

  if (filtered.length === 0) {
    el.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  el.innerHTML = filtered.map(l => {
    const vc = VERT_COLORS[l.vertical] || { bg:'bg-gray-50', text:'text-gray-600' };
    const tierColor = l.tier === 1 ? 'bg-green-50 text-green-700 border-green-200' : l.tier === 2 ? 'bg-blue-50 text-blue-700 border-blue-200' : 'bg-gray-50 text-gray-500 border-gray-200';
    const scoreColor = l.tier === 1 ? 'bg-green-100 text-green-800' : l.tier === 2 ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-500';
    const statusBadge = l.status === 'ready' ? '<span class="inline-block px-2 py-0.5 rounded text-[10px] font-semibold bg-green-50 text-green-600 border border-green-200">Outreach ready</span>'
      : l.status === 'research' ? '<span class="inline-block px-2 py-0.5 rounded text-[10px] font-semibold bg-amber-50 text-amber-600 border border-amber-200">Needs research</span>'
      : l.status === 'sent' ? '<span class="inline-block px-2 py-0.5 rounded text-[10px] font-semibold bg-blue-50 text-blue-600 border border-blue-200">Sent</span>'
      : '<span class="inline-block px-2 py-0.5 rounded text-[10px] font-semibold bg-gray-50 text-gray-400 border border-gray-200">Monitoring</span>';

    return `
    <div class="mb-2">
      <div class="lead-row bg-white rounded-xl border border-gray-200 hover:border-gray-300 cursor-pointer" onclick="toggleExpand('${l.id}')">
        <div class="flex items-center gap-4 p-4">
          <div class="score-ring ${scoreColor} mono">${l.score}</div>
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 flex-wrap">
              <span class="font-semibold text-navy-900 text-sm">${l.name}</span>
              <span class="vert-pill ${vc.bg} ${vc.text}">${l.vertLabel}</span>
              ${statusBadge}
            </div>
            <div class="text-xs text-gray-500 mt-1 truncate">${l.locations} locations &middot; ${l.states} states &middot; ${l.ownership}</div>
          </div>
          <div class="text-right hidden sm:block">
            <div class="text-sm font-semibold text-navy-900 mono">${l.value}</div>
            <div class="text-[10px] text-gray-400 uppercase font-semibold tracking-wide mt-0.5">Tier ${l.tier}</div>
          </div>
          <svg class="w-5 h-5 text-gray-300 flex-shrink-0 transition-transform" id="chevron-${l.rid}" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
      </div>
      <div class="expanded-panel" id="panel-${l.rid}">
        <div class="bg-white border-x border-b border-gray-200 rounded-b-xl px-6 py-5 -mt-1">
          <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div>
              <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Signal</h4>
              <p class="text-sm text-gray-700 leading-relaxed">${l.signal}</p>
              <p class="text-xs text-gray-400 mt-2">Source: ${l.source} &middot; ${l.signalDate}</p>

              <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mt-5 mb-2">Play</h4>
              <p class="text-sm text-gray-700 leading-relaxed">${l.play}</p>
            </div>
            <div>
              <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-2">Target contact</h4>
              <p class="text-sm text-gray-700">${l.contact}${l.contactName ? ' — ' + l.contactName : ''}</p>
              ${l.linkedin ? '<p class="text-xs text-blue-600 mt-1">' + l.linkedin + '</p>' : ''}

              <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mt-5 mb-2">Details</h4>
              <div class="grid grid-cols-2 gap-2 text-xs">
                <div class="text-gray-400">Estimated value</div><div class="text-gray-700 font-medium">${l.value}</div>
                <div class="text-gray-400">Ownership</div><div class="text-gray-700 font-medium">${l.ownership}</div>
                <div class="text-gray-400">Locations</div><div class="text-gray-700 font-medium">${l.locations}</div>
                <div class="text-gray-400">States</div><div class="text-gray-700 font-medium">${l.states}</div>
              </div>

              <div class="flex gap-2 mt-6">
                ${l.status === 'ready' ? `<button onclick="showOutreach('${l.id}', event)" class="bg-navy-900 hover:bg-navy-800 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Approve outreach</button>` : ''}
                ${l.status === 'sent' ? '<span class="text-xs text-blue-600 font-medium py-2">Outreach sent</span>' : ''}
                ${l.status === 'research' ? `<button onclick="showOutreach('${l.id}', event)" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Draft outreach</button>` : ''}
                <button onclick="archiveLead('${l.id}', event)" class="bg-white border border-gray-200 text-gray-400 hover:text-red-500 hover:border-red-200 text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Archive</button>
              </div>

              <!-- Outreach draft panel -->
              <div class="expanded-panel mt-4" id="outreach-${l.rid}">
                <div class="bg-gray-50 rounded-xl border border-gray-200 p-5">
                  <h4 class="text-xs font-semibold text-gray-400 uppercase tracking-wide mb-3">Draft outreach</h4>
                  <div class="mb-3">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Subject</label>
                    <input type="text" id="outreach-subject-${l.rid}" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white" onclick="event.stopPropagation()">
                  </div>
                  <div class="mb-4">
                    <label class="block text-xs font-medium text-gray-500 mb-1">Body</label>
                    <textarea id="outreach-body-${l.rid}" class="w-full px-3 py-2 text-sm border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent bg-white leading-relaxed resize-none" rows="12" onclick="event.stopPropagation()" oninput="autoResize(this)"></textarea>
                  </div>
                  <div class="flex gap-2">
                    <button id="copy-btn-${l.rid}" onclick="copyOutreach('${l.id}', event)" class="bg-navy-900 hover:bg-navy-800 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Copy to clipboard</button>
                    <button onclick="markSent('${l.id}', event)" class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Mark as sent</button>
                    <button onclick="document.getElementById('outreach-${l.rid}').classList.remove('open');event.stopPropagation();" class="bg-white border border-gray-200 text-gray-500 hover:border-gray-300 text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Cancel</button>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function toggleExpand(id) {
  const l = LEADS.find(x => x.id === id);
  if (!l) return;
  const rid = l.rid;
  const panel = document.getElementById('panel-' + rid);
  const chevron = document.getElementById('chevron-' + rid);
  const isOpen = panel.classList.contains('open');

  document.querySelectorAll('.expanded-panel.open').forEach(p => {
    p.classList.remove('open');
  });
  document.querySelectorAll('[id^=chevron-]').forEach(c => {
    c.style.transform = '';
  });

  if (!isOpen) {
    panel.classList.add('open');
    chevron.style.transform = 'rotate(180deg)';
  }
}

if (document.getElementById('dashboard').classList.contains('hidden') === false) {
  init();
}
</script>
</body>
</html>
