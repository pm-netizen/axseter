<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Pipeline | Axseter Systems</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="shortcut icon" href="/favicon.ico">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'navy': {
              50: '#f0f4f8', 100: '#d9e2ec', 200: '#bcccdc', 300: '#9fb3c8',
              400: '#829ab1', 500: '#627d98', 600: '#486581', 700: '#334e68',
              800: '#243b53', 900: '#102a43', 950: '#0a1929'
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    .mono { font-family: 'Inter', monospace; }

    /* Score ring */
    .score-ring {
      width: 44px; height: 44px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
      font-family: 'Inter', monospace;
    }

    /* Lead row hover */
    .lead-row { transition: border-color 0.15s ease, box-shadow 0.15s ease; }
    .lead-row:hover { box-shadow: 0 2px 12px rgba(16,42,67,0.07); }

    /* Collapsible panels */
    .collapsible { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease; opacity: 0; }
    .collapsible.open { max-height: 1200px; opacity: 1; }

    /* Vertical pills */
    .vert-pill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; letter-spacing: 0.04em; text-transform: uppercase; }

    /* Status badge */
    .status-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }

    /* Tab underline */
    .tab-btn { border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
    .tab-btn.active { border-bottom-color: #102a43; color: #102a43; }

    /* Outreach textarea auto-resize */
    textarea.auto-resize { resize: none; overflow: hidden; }

    /* Spin animation for loading */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin 0.8s linear infinite; }

    /* Toast */
    #toast { transition: opacity 0.3s ease, transform 0.3s ease; }
    #toast.hidden { opacity: 0; transform: translateY(8px); pointer-events: none; }

    /* Smooth fade for filters */
    .filter-btn { transition: all 0.15s ease; }

    /* Chevron */
    .chevron { transition: transform 0.25s ease; }
    .chevron.rotated { transform: rotate(180deg); }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

<!-- ═══════════════════════════════════════════
     AUTH GATE
════════════════════════════════════════════ -->
<div id="authGate" class="min-h-screen flex items-center justify-center bg-navy-950">
  <div class="bg-white rounded-2xl shadow-2xl p-10 w-full max-w-sm mx-4">
    <div class="text-center mb-8">
      <a href="/" class="inline-block">
        <span class="text-2xl font-black tracking-tight text-navy-900 mono" style="letter-spacing:-0.03em;">AXSETER<sup class="text-xs font-semibold text-gray-400 ml-0.5">™</sup></span>
      </a>
      <p class="text-gray-500 text-sm mt-2 font-medium">Pipeline Dashboard</p>
    </div>
    <div>
      <label class="block text-xs font-semibold text-gray-600 mb-1.5 uppercase tracking-wide">Access Code</label>
      <input
        type="password"
        id="authPass"
        class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-navy-900 focus:border-transparent transition-shadow"
        placeholder="••••••••••••"
        onkeydown="if(event.key==='Enter') handleAuth()"
        autofocus
      >
      <p id="authErr" class="text-red-500 text-xs mt-2 hidden font-medium">Incorrect access code. Try again.</p>
      <button
        onclick="handleAuth()"
        class="w-full mt-4 bg-navy-900 hover:bg-navy-800 active:bg-navy-950 text-white font-semibold py-3 rounded-xl text-sm transition-colors"
      >
        Access Pipeline
      </button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════
     DASHBOARD
════════════════════════════════════════════ -->
<div id="dashboard" class="hidden min-h-screen">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex items-center justify-between h-14">
      <div class="flex items-center gap-3">
        <a href="/" class="text-lg font-black tracking-tight text-navy-900 mono" style="letter-spacing:-0.03em;">AXSETER<sup class="text-[9px] font-semibold text-gray-400 ml-0.5">™</sup></a>
        <span class="text-gray-300 font-light">/</span>
        <span class="text-gray-500 font-semibold text-sm">Pipeline</span>
      </div>
      <div class="flex items-center gap-4">
        <span class="text-xs text-gray-400 mono hidden sm:block" id="lastUpdated"></span>
        <button
          onclick="signOut()"
          class="text-xs text-gray-400 hover:text-gray-700 font-medium transition-colors"
        >
          Sign out
        </button>
      </div>
    </div>
  </header>

  <!-- Loading state -->
  <div id="loadingState" class="flex flex-col items-center justify-center py-32">
    <div class="w-8 h-8 border-2 border-navy-900 border-t-transparent rounded-full spin mb-4"></div>
    <p class="text-sm text-gray-400 font-medium">Loading pipeline…</p>
  </div>

  <!-- Error state -->
  <div id="errorState" class="hidden flex flex-col items-center justify-center py-32 px-6 text-center">
    <div class="text-4xl mb-4">⚠️</div>
    <p class="text-gray-700 font-semibold mb-2">Failed to load pipeline</p>
    <p class="text-gray-400 text-sm mb-6" id="errorMsg"></p>
    <button onclick="init()" class="bg-navy-900 hover:bg-navy-800 text-white text-sm font-semibold px-6 py-2.5 rounded-xl transition-colors">Retry</button>
  </div>

  <!-- Main content (hidden until loaded) -->
  <main id="mainContent" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Metric cards -->
    <div class="grid grid-cols-2 lg:grid-cols-5 gap-3 mb-8" id="metrics"></div>

    <!-- Vertical filters -->
    <div class="flex flex-wrap gap-2 mb-3" id="vertFilters"></div>

    <!-- Status filters -->
    <div class="flex flex-wrap gap-2 mb-6" id="statusFilters"></div>

    <!-- Lead list -->
    <div id="leadList" class="space-y-2"></div>

    <!-- Empty state -->
    <div id="emptyState" class="hidden text-center py-20">
      <p class="text-gray-400 text-sm font-medium">No leads match the current filters.</p>
    </div>

  </main>
</div>

<!-- Toast notification -->
<div
  id="toast"
  class="hidden fixed bottom-6 right-6 z-50 bg-navy-900 text-white text-sm font-medium px-5 py-3 rounded-xl shadow-lg"
></div>

// ─── Label maps ──────────────────────────────────────────────────────────────
const VERT_LABELS = {

};

// Vertical color palettes
const VERT_COLORS = {
  dental:     { bg: 'bg-purple-50', text: 'text-purple-700', border: 'border-purple-200' },
  behavioral: { bg: 'bg-pink-50',   text: 'text-pink-700',   border: 'border-pink-200' },
  pt:         { bg: 'bg-teal-50',   text: 'text-teal-700',   border: 'border-teal-200' },

};

// ─── UUID → safe DOM id ──────────────────────────────────────────────────────
// UUIDs contain hyphens which are invalid in certain CSS/getElementById contexts
// We strip them to create safe element IDs, but always pass the full UUID to functions.
function safeId(uuid) {
  return 'l' + uuid.replace(/-/g, '');
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
function handleAuth() {
  const val = document.getElementById('authPass').value;
  if (val === ACCESS_CODE) {
    sessionStorage.setItem('ax_auth', '1');
    showDashboard();
  } else {
    document.getElementById('authErr').classList.remove('hidden');
    document.getElementById('authPass').focus();
  }
}

function showDashboard() {
  document.getElementById('authGate').classList.add('hidden');
  document.getElementById('dashboard').classList.remove('hidden');
  init();
}

function signOut() {
  sessionStorage.removeItem('ax_auth');
  location.reload();
}

// Auto-restore session
(function() {
  if (sessionStorage.getItem('ax_auth') === '1') {
    document.getElementById('authGate').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    document.addEventListener('DOMContentLoaded', init);
  }
})();

// ─── Data layer ───────────────────────────────────────────────────────────────
function mapLead(row) {
  return {
    id:               row.id,                         // full UUID — always use this for DB ops
    sid:              safeId(row.id),                 // safe DOM id prefix
    name:             row.name || '',
    score:            row.score || 0,
    tier:             row.tier || 3,
    vertical:         row.vertical || '',
    vertLabel:        row.vertical_label || VERT_LABELS[row.vertical] || row.vertical || '',
    locations:        row.locations || '—',
    states:           row.states || '—',
    signal:           row.signal || '',
    signalDate:       row.signal_date || '',
    source:           row.signal_source || '',
    play:             row.play || '',
    value:            row.estimated_value || '—',
    ownership:        row.ownership || '—',
    status:           row.status || 'new',
    outreachTemplate: row.outreach_template || 'expansion_announcement',
    peBacked:         row.pe_backed || false,
    // contact fields — enriched from contacts table
    contactName:      '',
    contactTitle:     '',
    contactEmail:     '',
    contactLinkedin:  '',
  };
}

async function loadLeads() {
  const { data, error } = await sb
    .from('leads')
    .select('*')
    .not('status', 'eq', 'archived')
    .order('score', { ascending: false });

  if (error) throw error;
  LEADS = (data || []).map(mapLead);
}

async function loadContacts() {
  if (!LEADS.length) return;
  const { data } = await sb.from('contacts').select('*');
  if (!data) return;
  for (const c of data) {
    const lead = LEADS.find(l => l.id === c.lead_id);
    if (!lead) continue;
    if (c.name)     lead.contactName     = c.name;
    if (c.title)    lead.contactTitle    = c.title;
    if (c.email)    lead.contactEmail    = c.email;
    if (c.linkedin) lead.contactLinkedin = c.linkedin;
  }
}

async function saveOutreach(lead, subject, body) {
  await sb.from('outreach').insert({
    lead_id:       lead.id,
    template_used: lead.outreachTemplate,
    subject:       subject,
    body:          body,
    status:        'sent',
    sent_at:       new Date().toISOString(),
  });
}

async function logActivity(leadId, action, detail) {
  await sb.from('activity').insert({
    lead_id: leadId,
    action:  action,
    detail:  detail,
  });
}

// ─── Outreach templates ───────────────────────────────────────────────────────

function getDraft(lead) {
  const tmpl = TEMPLATES[lead.outreachTemplate] || TEMPLATES.expansion_announcement;
  return tmpl(lead);
}

// ─── Metrics ──────────────────────────────────────────────────────────────────
function renderMetrics() {
  const t1    = LEADS.filter(l => l.tier === 1).length;
  const t2    = LEADS.filter(l => l.tier === 2).length;
  const ready = LEADS.filter(l => l.status === 'ready').length;
  const verts = new Set(LEADS.map(l => l.vertical)).size;

  // Rough pipeline value calc from estimated_value strings (e.g. "$240K–$480K")
  let pipMin = 0, pipMax = 0;
  LEADS.forEach(l => {
    const m = (l.value || '').replace(/[$,]/g, '').match(/([\d.]+)K?–?([\d.]+)?K?/i);
    if (m) {
      const toNum = (s, k) => s ? parseFloat(s) * (k ? 1000 : 1) : 0;
      const hasK  = /K/i.test(l.value);
      pipMin += toNum(m[1], hasK);
      pipMax += toNum(m[2] || m[1], hasK);
    }
  });
  const pipStr = pipMin > 0 ? `$${(pipMin / 1e6).toFixed(1)}M+` : '—';

  const cards = [
    { value: t1,     label: 'Tier 1 leads',       color: 'text-green-600' },
    { value: t2,     label: 'Tier 2 leads',        color: 'text-blue-600' },
    { value: ready,  label: 'Outreach ready',      color: 'text-navy-900' },
    { value: pipStr, label: 'Est. pipeline value', color: 'text-navy-900' },
    { value: verts,  label: 'Verticals',           color: 'text-navy-900' },
  ];

  document.getElementById('metrics').innerHTML = cards.map(c => `
    <div class="bg-white rounded-xl border border-gray-200 p-5">
      <div class="text-2xl font-bold ${c.color} mono">${c.value}</div>
      <div class="text-[11px] text-gray-400 font-semibold mt-1 uppercase tracking-wide">${c.label}</div>
    </div>
  `).join('');
}

// ─── Vertical filters ─────────────────────────────────────────────────────────
function renderVertFilters() {
  const verts = ['all', ...new Set(LEADS.map(l => l.vertical).filter(Boolean))];
  document.getElementById('vertFilters').innerHTML = verts.map(v => {
    const count = v === 'all' ? LEADS.length : LEADS.filter(l => l.vertical === v).length;
    const on    = v === activeVert;
    const label = VERT_LABELS[v] || v;
    return `<button
      class="filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold ${on ? 'bg-navy-900 text-white' : 'bg-white text-gray-500 border border-gray-200 hover:border-gray-300 hover:text-gray-700'}"
      onclick="setVertFilter('${v}')"
    >${label}${v !== 'all' ? ` (${count})` : ''}</button>`;
  }).join('');
}

function setVertFilter(v) {
  activeVert   = v;
  activeStatus = 'all';
  renderAll();
}

// ─── Status filters ───────────────────────────────────────────────────────────
function renderStatusFilters() {
  const base     = activeVert === 'all' ? LEADS : LEADS.filter(l => l.vertical === activeVert);
  const statuses = ['all', 'ready', 'research', 'sent', 'monitor', 'responded'];
  document.getElementById('statusFilters').innerHTML = statuses.map(s => {
    const count = s === 'all' ? base.length : base.filter(l => l.status === s).length;
    if (s !== 'all' && count === 0) return '';
    const on = s === activeStatus;
    return `<button
      class="filter-btn px-3 py-1.5 rounded-lg text-xs font-medium ${on ? 'bg-gray-200 text-gray-800 font-semibold' : 'bg-white text-gray-400 border border-gray-100 hover:text-gray-600'}"
      onclick="setStatusFilter('${s}')"
    >${STATUS_LABELS[s]}${s !== 'all' ? ` (${count})` : ''}</button>`;
  }).join('');
}

function setStatusFilter(s) {
  activeStatus = s;
  renderStatusFilters();
  renderLeads();
}

// ─── Status badge HTML ────────────────────────────────────────────────────────
function statusBadge(status) {
  const map = {
    ready:     'bg-green-50 text-green-700 border border-green-200',
    research:  'bg-amber-50 text-amber-700 border border-amber-200',
    sent:      'bg-blue-50 text-blue-700 border border-blue-200',
    monitor:   'bg-gray-50 text-gray-500 border border-gray-200',
    responded: 'bg-purple-50 text-purple-700 border border-purple-200',
  };
  const labels = { ready:'Outreach ready', research:'Needs research', sent:'Sent', monitor:'Monitoring', responded:'Responded' };
  const cls = map[status] || 'bg-gray-50 text-gray-400 border border-gray-200';
  const lbl = labels[status] || status;
  return `<span class="status-badge ${cls}">${lbl}</span>`;
}

// ─── Lead card HTML ───────────────────────────────────────────────────────────
function buildLeadCard(lead) {
  const vc        = VERT_COLORS[lead.vertical] || { bg:'bg-gray-50', text:'text-gray-600', border:'border-gray-200' };
  const scoreClass= lead.tier === 1 ? 'bg-green-100 text-green-800' : lead.tier === 2 ? 'bg-blue-100 text-blue-800' : 'bg-gray-100 text-gray-500';
  const tierClass = lead.tier === 1 ? 'text-green-600' : lead.tier === 2 ? 'text-blue-600' : 'text-gray-400';
  const sid       = lead.sid;

  // Template selector options
  const tmplOptions = [
    { key: 'expansion_announcement', label: 'Expansion announcement' },
    { key: 'acquisition_integration', label: 'Acquisition integration' },
    { key: 'vendor_consolidation',   label: 'Vendor consolidation' },
  ].map(t => `<option value="${t.key}" ${lead.outreachTemplate === t.key ? 'selected' : ''}>${t.label}</option>`).join('');

  // Outreach action buttons
  let outreachBtn = '';
  if (lead.status === 'ready') {
    outreachBtn = `<button onclick="toggleOutreach('${lead.id}', event)" class="bg-navy-900 hover:bg-navy-800 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Approve outreach</button>`;
  } else if (lead.status === 'research') {
    outreachBtn = `<button onclick="toggleOutreach('${lead.id}', event)" class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors">Draft outreach</button>`;
  } else if (lead.status === 'sent') {
    outreachBtn = `<span class="text-xs font-medium text-blue-600 py-2 inline-block">✓ Outreach sent</span>`;
  }

  return `
  <div class="lead-row bg-white rounded-xl border border-gray-200" id="card-${sid}">

    <!-- Row header (clickable) -->
    <div
      class="flex items-center gap-4 p-4 cursor-pointer select-none"
      onclick="toggleExpand('${lead.id}')"
      role="button"
      aria-expanded="false"
      id="cardrow-${sid}"
    >
      <div class="score-ring ${scoreClass}">${lead.score}</div>

      <div class="flex-1 min-w-0">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="font-semibold text-navy-900 text-sm">${escHtml(lead.name)}</span>
          <span class="vert-pill ${vc.bg} ${vc.text}">${escHtml(lead.vertLabel)}</span>
          ${statusBadge(lead.status)}
          ${lead.peBacked ? '<span class="vert-pill bg-indigo-50 text-indigo-700">PE-backed</span>' : ''}
        </div>
        <div class="text-xs text-gray-400 mt-1 truncate">
          ${lead.locations} locations&nbsp;&middot;&nbsp;${lead.states} states&nbsp;&middot;&nbsp;${escHtml(lead.ownership)}
        </div>
      </div>

      <div class="text-right hidden sm:block shrink-0">
        <div class="text-sm font-bold text-navy-900 mono">${escHtml(lead.value)}</div>
        <div class="text-[10px] font-bold uppercase tracking-wide mt-0.5 ${tierClass}">Tier ${lead.tier}</div>
      </div>

      <svg class="chevron w-5 h-5 text-gray-300 shrink-0" id="chev-${sid}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
      </svg>
    </div>

    <!-- Expanded panel -->
    <div class="collapsible" id="panel-${sid}">
      <div class="border-t border-gray-100 px-6 py-5">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">

          <!-- Left: Signal + Play -->
          <div>
            <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Signal</h4>
            <p class="text-sm text-gray-700 leading-relaxed">${escHtml(lead.signal)}</p>
            ${lead.source ? `<p class="text-xs text-gray-400 mt-1.5">Source: ${escHtml(lead.source)}${lead.signalDate ? ' · ' + escHtml(lead.signalDate) : ''}</p>` : ''}

            <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-5 mb-2">Play</h4>
            <p class="text-sm text-gray-700 leading-relaxed">${escHtml(lead.play)}</p>
          </div>

          <!-- Right: Contact + Details + Actions -->
          <div>
            <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Target contact</h4>
            ${lead.contactName
              ? `<p class="text-sm font-semibold text-navy-900">${escHtml(lead.contactName)}</p>
                 <p class="text-xs text-gray-500">${escHtml(lead.contactTitle)}</p>`
              : `<p class="text-sm text-gray-500">${escHtml(lead.contactTitle) || 'VP of Real Estate / Facilities'}</p>`
            }
            ${lead.contactEmail    ? `<p class="text-xs text-blue-600 mt-0.5">${escHtml(lead.contactEmail)}</p>` : ''}
            ${lead.contactLinkedin ? `<p class="text-xs text-blue-500 mt-0.5">${escHtml(lead.contactLinkedin)}</p>` : ''}

            <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-5 mb-2">Details</h4>
            <div class="grid grid-cols-2 gap-x-4 gap-y-1.5 text-xs">
              <div class="text-gray-400">Est. value</div>  <div class="text-gray-700 font-semibold mono">${escHtml(lead.value)}</div>
              <div class="text-gray-400">Ownership</div>   <div class="text-gray-700 font-medium">${escHtml(lead.ownership)}</div>
              <div class="text-gray-400">Locations</div>   <div class="text-gray-700 font-medium">${lead.locations}</div>
              <div class="text-gray-400">States</div>      <div class="text-gray-700 font-medium">${lead.states}</div>
            </div>

            <!-- Action buttons -->
            <div class="flex flex-wrap gap-2 mt-5">
              ${outreachBtn}
              <button
                onclick="archiveLead('${lead.id}', event)"
                class="bg-white border border-gray-200 text-gray-400 hover:text-red-500 hover:border-red-200 text-xs font-semibold px-4 py-2 rounded-lg transition-colors"
              >Archive</button>
            </div>

            <!-- Outreach draft panel -->
            <div class="collapsible mt-4" id="outreach-${sid}">
              <div class="bg-gray-50 rounded-xl border border-gray-200 p-5">
                <div class="flex items-center justify-between mb-3">
                  <h4 class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Draft outreach</h4>
                  <select
                    id="tmpl-${sid}"
                    class="text-xs border border-gray-200 rounded-lg px-2 py-1.5 text-gray-600 bg-white focus:outline-none focus:ring-1 focus:ring-navy-900"
                    onchange="regenerateDraft('${lead.id}', event)"
                    onclick="event.stopPropagation()"
                  >
                    ${tmplOptions}
                  </select>
                </div>

                <div class="mb-3">
                  <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Subject</label>
                  <input
                    type="text"
                    id="subj-${sid}"
                    class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-navy-900 focus:border-transparent bg-white"
                    onclick="event.stopPropagation()"
                  >
                </div>
                <div class="mb-4">
                  <label class="block text-[10px] font-semibold text-gray-400 uppercase tracking-wide mb-1">Body</label>
                  <textarea
                    id="body-${sid}"
                    class="auto-resize w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-navy-900 focus:border-transparent bg-white leading-relaxed"
                    rows="10"
                    onclick="event.stopPropagation()"
                    oninput="autoResize(this)"
                  ></textarea>
                </div>
                <div class="flex flex-wrap gap-2">
                  <button
                    id="copybtn-${sid}"
                    onclick="copyDraft('${lead.id}', event)"
                    class="bg-navy-900 hover:bg-navy-800 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors"
                  >Copy to clipboard</button>
                  <button
                    onclick="markSent('${lead.id}', event)"
                    class="bg-green-600 hover:bg-green-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition-colors"
                  >Mark as sent</button>
                  <button
                    onclick="closeOutreach('${lead.id}', event)"
                    class="bg-white border border-gray-200 text-gray-500 hover:border-gray-300 text-xs font-semibold px-4 py-2 rounded-lg transition-colors"
                  >Cancel</button>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  </div>`;
}

// ─── Lead list render ─────────────────────────────────────────────────────────
function renderLeads() {
  let filtered = LEADS;
  if (activeVert   !== 'all') filtered = filtered.filter(l => l.vertical === activeVert);
  if (activeStatus !== 'all') filtered = filtered.filter(l => l.status  === activeStatus);

  const listEl  = document.getElementById('leadList');
  const emptyEl = document.getElementById('emptyState');

  if (filtered.length === 0) {
    listEl.innerHTML = '';
    emptyEl.classList.remove('hidden');
    return;
  }
  emptyEl.classList.add('hidden');
  listEl.innerHTML = filtered.map(buildLeadCard).join('');
}

// ─── Expand/collapse ──────────────────────────────────────────────────────────
function toggleExpand(uuid) {
  const lead = LEADS.find(l => l.id === uuid);
  if (!lead) return;
  const sid      = lead.sid;
  const panel    = document.getElementById('panel-' + sid);
  const chevron  = document.getElementById('chev-'  + sid);
  const rowEl    = document.getElementById('cardrow-' + sid);
  if (!panel) return;

  const isOpen = panel.classList.contains('open');

  // Collapse all panels first
  document.querySelectorAll('.collapsible.open').forEach(el => {
    if (!el.id.startsWith('outreach-')) el.classList.remove('open');
  });
  document.querySelectorAll('.chevron.rotated').forEach(el => el.classList.remove('rotated'));
  document.querySelectorAll('[aria-expanded="true"]').forEach(el => el.setAttribute('aria-expanded','false'));

  if (!isOpen) {
    panel.classList.add('open');
    chevron.classList.add('rotated');
    rowEl.setAttribute('aria-expanded', 'true');
  }
}

// ─── Outreach panel ───────────────────────────────────────────────────────────
function toggleOutreach(uuid, evt) {
  if (evt) evt.stopPropagation();
  const lead = LEADS.find(l => l.id === uuid);
  if (!lead) return;
  const sid  = lead.sid;
  const el   = document.getElementById('outreach-' + sid);
  if (!el) return;

  const isOpen = el.classList.contains('open');

  // Collapse any open outreach panels
  document.querySelectorAll('[id^="outreach-"].open').forEach(e => e.classList.remove('open'));

  if (!isOpen) {
    // Fill draft
    const draft = getDraft(lead);
    document.getElementById('subj-' + sid).value = draft.subject;
    const bodyEl = document.getElementById('body-' + sid);
    bodyEl.value = draft.body;
    el.classList.add('open');
    setTimeout(() => autoResize(bodyEl), 50);
  }
}

function closeOutreach(uuid, evt) {
  if (evt) evt.stopPropagation();
  const lead = LEADS.find(l => l.id === uuid);
  if (!lead) return;
  document.getElementById('outreach-' + lead.sid)?.classList.remove('open');
}

function regenerateDraft(uuid, evt) {
  if (evt) evt.stopPropagation();
  const lead = LEADS.find(l => l.id === uuid);
  if (!lead) return;
  const sid    = lead.sid;
  const tmplKey = document.getElementById('tmpl-' + sid).value;
  lead.outreachTemplate = tmplKey;
  const draft  = getDraft(lead);
  document.getElementById('subj-' + sid).value = draft.subject;
  const bodyEl = document.getElementById('body-' + sid);
  bodyEl.value = draft.body;
  autoResize(bodyEl);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = el.scrollHeight + 'px';
}

// ─── Copy to clipboard ────────────────────────────────────────────────────────
function copyDraft(uuid, evt) {
  if (evt) evt.stopPropagation();
  const lead = LEADS.find(l => l.id === uuid);
  if (!lead) return;
  const sid  = lead.sid;
  const subj = document.getElementById('subj-' + sid)?.value || '';
  const body = document.getElementById('body-' + sid)?.value || '';
  const full = `Subject: ${subj}\n\n${body}`;

  navigator.clipboard.writeText(full).then(() => {
    const btn = document.getElementById('copybtn-' + sid);
    if (btn) {
      const orig = btn.textContent;
      btn.textContent = '✓ Copied!';
      btn.classList.replace('bg-navy-900', 'bg-green-600');
      btn.classList.remove('hover:bg-navy-800');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.replace('bg-green-600', 'bg-navy-900');
        btn.classList.add('hover:bg-navy-800');
      }, 2000);
    }
    showToast('Copied to clipboard');
  }).catch(() => showToast('Copy failed — try manually'));
}

// ─── Mark as sent ─────────────────────────────────────────────────────────────
async function markSent(uuid, evt) {
  if (evt) evt.stopPropagation();
  const lead = LEADS.find(l => l.id === uuid);
  if (!lead) return;
  const sid  = lead.sid;
  const subj = document.getElementById('subj-' + sid)?.value || '';
  const body = document.getElementById('body-' + sid)?.value || '';

  // Optimistic update
  lead.status = 'sent';
  document.getElementById('outreach-' + sid)?.classList.remove('open');
  renderAll();
  showToast('Marked as sent');

  // Persist
  try {
    await sb.from('leads').update({ status: 'sent' }).eq('id', uuid);
    await saveOutreach(lead, subj, body);
    await logActivity(uuid, 'outreach_sent', `Subject: ${subj}`);
  } catch (err) {
    console.error('markSent persist error:', err);
    showToast('Saved locally but DB sync failed');
  }
}

// ─── Archive lead ─────────────────────────────────────────────────────────────
async function archiveLead(uuid, evt) {
  if (evt) evt.stopPropagation();

  // Optimistic update
  const idx = LEADS.findIndex(l => l.id === uuid);
  if (idx === -1) return;
  LEADS.splice(idx, 1);
  renderAll();
  showToast('Lead archived');

  // Persist
  try {
    await sb.from('leads').update({ status: 'archived', archived_at: new Date().toISOString() }).eq('id', uuid);
    await logActivity(uuid, 'archived', 'Lead archived from pipeline');
  } catch (err) {
    console.error('archiveLead persist error:', err);
  }
}

// ─── Render all ───────────────────────────────────────────────────────────────
function renderAll() {
  renderMetrics();
  renderVertFilters();
  renderStatusFilters();
  renderLeads();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
  // Show loading, hide error + content
  document.getElementById('loadingState').classList.remove('hidden');
  document.getElementById('errorState').classList.add('hidden');
  document.getElementById('mainContent').classList.add('hidden');
  document.getElementById('lastUpdated').textContent = '';

  try {
    await loadLeads();
    await loadContacts();

    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('mainContent').classList.remove('hidden');

    document.getElementById('lastUpdated').textContent =
      'Updated ' + new Date().toLocaleString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' });

    renderAll();
  } catch (err) {
    document.getElementById('loadingState').classList.add('hidden');
    document.getElementById('errorState').classList.remove('hidden');
    document.getElementById('errorMsg').textContent = err?.message || 'Unknown error';
    console.error('Pipeline init error:', err);
  }
}

// ─── Toast ────────────────────────────────────────────────────────────────────
let _toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.remove('hidden');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.add('hidden'), 2800);
}

// ─── Utility ─────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

</script>
