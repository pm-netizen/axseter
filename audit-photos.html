let broken = 0, loaded = 0, total = 0;
const grid = document.getElementById('grid');

cities.forEach(c => {
  const div = document.createElement('div');
  div.className = 'city';
  div.innerHTML = `<div class="city-name">${c.city}</div><div class="photos"></div>`;
  const photos = div.querySelector('.photos');
  
  ['hero', 'street', 'dusk'].forEach(type => {
    const id = c[type];
    const slot = document.createElement('div');
    slot.className = 'photo-slot';
    slot.id = `${c.city}-${type}`;
    const img = document.createElement('img');
    img.src = `https://images.unsplash.com/${id}?w=400&h=225&fit=crop&q=60`;
    img.alt = `${c.city} ${type}`;
    total++;
    img.onload = () => { loaded++; updateSummary(); };
    img.onerror = () => { 
      slot.classList.add('broken'); 
      broken++; 
      updateSummary(); 
    };
    slot.appendChild(img);
    slot.innerHTML += `<div class="label">${type}: ${id}</div>`;
    photos.appendChild(slot);
  });
  grid.appendChild(div);
});

function updateSummary() {
  document.getElementById('summary').innerHTML = 
    `✅ ${loaded} loaded | ❌ ${broken} broken | ⏳ ${total - loaded - broken} pending`;
